interface:
  display_name: "Paper Reference Archiver"
  short_description: "Archive PDFs into paper_reference"
  default_prompt: "Use $paper-reference-archiver to process new PDFs in paper_reference/temp or verify paper_reference citation metadata. Fully inspect every paper, verify title, venue, year, DOI, official link, and publication status against official sources, classify it, write a detailed template-based reading summary, write a full Chinese translation of the main content, use subagents for paper-level writing when there are at least 3 papers, then update category summaries and the index."

policy:
  allow_implicit_invocation: true
